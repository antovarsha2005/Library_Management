<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librarian Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-shell">
        <div class="auth-card">
            <h1 class="auth-title">Librarian Login</h1>
            <p class="auth-subtitle">Access the library management system.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="alerts">
                        {% for category, message in messages %}
                            <div class="alert {{ 'alert-success' if category == 'success' else 'alert-error' }}">
                                {{ message }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}" class="auth-form">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Email" autocomplete="email" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password" required>

                <button type="submit" class="btn-primary">Login</button>
            </form>

            <p class="auth-footer">Need an account? <a href="{{ url_for('signup') }}">Register</a></p>
        </div>
    </div>
</body>
</html>
