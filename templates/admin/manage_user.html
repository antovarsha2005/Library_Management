{% extends "admin/base.html" %}
{% block title %}Manage User | Library Management{% endblock %}

{% block content %}
<section class="page-heading">
    <h1>Manage User</h1>
    <p>Choose an action to manage library members.</p>
</section>

<section class="card-grid action-grid">
    <a class="action-card" href="{{ url_for('user.add_user') }}">
        <div class="action-icon"><i class="fa-solid fa-user-plus"></i></div>
        <h2>Add User</h2>
        <p>Create a new library user account.</p>
    </a>

    <a class="action-card" href="{{ url_for('user.view_users') }}">
        <div class="action-icon"><i class="fa-solid fa-address-card"></i></div>
        <h2>View Users</h2>
        <p>Open all registered users and edit details.</p>
    </a>
</section>
{% endblock %}
