{% extends "admin/base.html" %}
{% block title %}Update User | Library Management{% endblock %}

{% block content %}
<section class="page-heading">
    <h1>Update User</h1>
    <p>Edit user details and save changes to SQLite.</p>
</section>

<section class="form-card">
    <form method="post" class="user-form">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" required value="{{ user.name }}">

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required value="{{ user.email }}">

        <label for="password">Password</label>
        <input id="password" name="password" type="text" required value="{{ user.password }}">

        <label for="role">Role</label>
        <select id="role" name="role" required>
            <option value="admin" {% if (user.role|lower) == 'admin' %}selected{% endif %}>Admin</option>
            <option value="librarian" {% if (user.role|lower) == 'librarian' %}selected{% endif %}>Librarian</option>
            <option value="user" {% if (user.role|lower) == 'user' %}selected{% endif %}>User</option>
        </select>

        <div class="form-actions">
            <a class="btn btn-light" href="{{ url_for('user.view_users') }}">Cancel</a>
            <button class="btn btn-primary" type="submit">Save Changes</button>
        </div>
    </form>
</section>
{% endblock %}
