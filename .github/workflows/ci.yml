name: Library Management CI/CD

on:
  push:
    branches:
      - main

jobs:
  # Stage 1: Clone
  clone:
    name: Stage 1 - Clone Repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

  # Stage 2: Build
  build:
    name: Stage 2 - Build Application
    runs-on: ubuntu-latest
    needs: clone
    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify build
        run: python -m py_compile app.py

  # Stage 3: Docker Image Creation
  docker:
    name: Stage 3 - Docker Image Creation
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/library-management:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/library-management:latest
