name: Library Management CI/CD

on:
  push:
    branches:
      - main

jobs:

  # =====================================
  # Stage 1: Clone Repository
  # =====================================
  clone:
    name: Stage 1 - Clone Repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # Upload repo as artifact for next jobs
      - name: Upload source code
        uses: actions/upload-artifact@v4
        with:
          name: source-code
          path: .

  # =====================================
  # Stage 2: Build Application
  # =====================================
  build:
    name: Stage 2 - Build Application
    runs-on: ubuntu-latest
    needs: clone

    steps:
      # Download code from clone stage
      - name: Download source code
        uses: actions/download-artifact@v4
        with:
          name: source-code

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify build
        run: python -m py_compile app.py

      # Pass verified build forward
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-app
          path: .

  # =====================================
  # Stage 3: Docker Build & Push
  # =====================================
  build-and-dockerize:
    name: Stage 3 - Docker Image Creation
    runs-on: ubuntu-latest
    needs: build

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME || secrets.DOCKERHUB_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD || secrets.DOCKERHUB_TOKEN || secrets.DOCKERHUB_PASSWORD }}

    steps:
      # Download built app
      - name: Download built application
        uses: actions/download-artifact@v4
        with:
          name: built-app

      - name: Resolve Docker image metadata
        id: image
        run: |
          if [ -n "${DOCKER_USERNAME}" ] && [ -n "${DOCKER_PASSWORD}" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
            echo "name=${DOCKER_USERNAME}/library-management:latest" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
            echo "name=library-management:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to DockerHub
        if: steps.image.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t "${{ steps.image.outputs.name }}" .

      - name: Push Docker image
        if: steps.image.outputs.push == 'true'
        run: docker push "${{ steps.image.outputs.name }}"

      - name: Docker push skipped
        if: steps.image.outputs.push != 'true'
        run: echo "Docker credentials not found — image built locally only."