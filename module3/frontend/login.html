<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LibraryOS — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:     #1a1814;
      --paper:   #f5f0e8;
      --cream:   #ede7d9;
      --rule:    #c8bfaa;
      --accent:  #2d5016;
      --accent2: #8b3a0f;
      --muted:   #7a7468;
      --white:   #fdfaf4;
    }

    html, body {
      height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: 'Outfit', sans-serif;
    }

    /* ── decorative lines ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 31px,
          rgba(180,168,148,.18) 31px,
          rgba(180,168,148,.18) 32px
        );
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* ── Left panel ── */
    .left {
      background: var(--ink);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 56px 52px;
      position: relative;
      overflow: hidden;
    }

    .left::after {
      content: '';
      position: absolute;
      bottom: -80px; right: -80px;
      width: 340px; height: 340px;
      border-radius: 50%;
      border: 1px solid rgba(245,240,232,.06);
    }
    .left::before {
      content: '';
      position: absolute;
      bottom: -40px; right: -40px;
      width: 220px; height: 220px;
      border-radius: 50%;
      border: 1px solid rgba(245,240,232,.1);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .brand-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(245,240,232,.35);
    }
    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--paper);
      letter-spacing: -.4px;
    }
    .brand-name em { font-style: italic; font-weight: 400; color: #b8d4a0; }

    .left-body { flex: 1; display: flex; align-items: center; }
    .left-headline {
      font-family: 'Playfair Display', serif;
      font-size: 52px;
      font-weight: 700;
      color: var(--paper);
      line-height: 1.1;
      letter-spacing: -1px;
    }
    .left-headline em {
      display: block;
      font-style: italic;
      font-weight: 400;
      color: #b8d4a0;
    }

    .left-footer {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: rgba(245,240,232,.3);
    }

    /* ── Right panel ── */
    .right {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 52px 64px;
      background: var(--white);
    }

    .login-box {
      width: 100%;
      max-width: 360px;
      animation: fadeUp .45s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-box h2 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -.4px;
    }
    .login-box p {
      font-size: 13.5px;
      color: var(--muted);
      margin-bottom: 36px;
    }

    .divider {
      height: 1px;
      background: var(--rule);
      margin-bottom: 32px;
    }

    .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .field label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .field input {
      background: var(--paper);
      border: 1.5px solid var(--rule);
      border-radius: 8px;
      padding: 13px 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 16px;
      color: var(--ink);
      outline: none;
      transition: border-color .18s, box-shadow .18s;
    }
    .field input::placeholder { color: var(--rule); }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45,80,22,.1);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .06em;
      cursor: pointer;
      transition: background .18s, transform .12s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-login:hover { background: #2e2a24; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    #msg {
      margin-top: 18px;
      padding: 13px 16px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
      animation: fadeUp .2s ease both;
    }
    #msg.success { background: rgba(45,80,22,.1); color: var(--accent); border: 1px solid rgba(45,80,22,.2); }
    #msg.error   { background: rgba(139,58,15,.1); color: var(--accent2); border: 1px solid rgba(139,58,15,.2); }

    /* responsive */
    @media (max-width: 700px) {
      .page { grid-template-columns: 1fr; }
      .left { display: none; }
      .right { padding: 40px 28px; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- Left -->
  <div class="left">
    <div class="brand">
      <span class="brand-label">Library Management System</span>
      <span class="brand-name">Library<em>OS</em></span>
    </div>
    <div class="left-body">
      <h1 class="left-headline">
        Knowledge<br>at your<br><em>fingertips.</em>
      </h1>
    </div>
    <div class="left-footer">© 2025 LibraryOS &nbsp;·&nbsp; v1.0</div>
  </div>

  <!-- Right -->
  <div class="right">
    <div class="login-box">
      <h2>Welcome back</h2>
      <p>Enter your user ID to access the library system.</p>
      <div class="divider"></div>

      <div class="field">
        <label for="user_id">User ID</label>
        <input type="number" id="user_id" placeholder="e.g.  1" min="1" autofocus />
      </div>

      <button class="btn-login" id="btn-login" onclick="login()">
        <span>Sign In</span>
        <span>→</span>
      </button>

      <div id="msg"></div>
    </div>
  </div>

</div>

<script>
  const API = "http://127.0.0.1:5000";

  async function login() {
    const user_id = document.getElementById("user_id").value.trim();
    const btn = document.getElementById("btn-login");
    const msg = document.getElementById("msg");

    msg.style.display = "none";

    if (!user_id) {
      showMsg("error", "Please enter your User ID.");
      return;
    }

    btn.disabled = true;
    btn.innerHTML = "<span>Signing in…</span>";

    try {
      const res = await fetch(`${API}/login`, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: parseInt(user_id) }),
      });

      const data = await res.json();

      if (res.ok) {
        showMsg("success", data.message || "Login successful! Redirecting…");
        setTimeout(() => window.location.href = "dashboard.html", 900);
      } else {
        showMsg("error", data.error || "Login failed. Please try again.");
        btn.disabled = false;
        btn.innerHTML = "<span>Sign In</span><span>→</span>";
      }
    } catch {
      showMsg("error", "Cannot reach server at " + API + ". Is Flask running?");
      btn.disabled = false;
      btn.innerHTML = "<span>Sign In</span><span>→</span>";
    }
  }

  function showMsg(type, text) {
    const msg = document.getElementById("msg");
    msg.className = type;
    msg.textContent = text;
    msg.style.display = "block";
  }

  // allow Enter key
  document.getElementById("user_id").addEventListener("keydown", (e) => {
    if (e.key === "Enter") login();
  });
</script>
</body>
</html>
